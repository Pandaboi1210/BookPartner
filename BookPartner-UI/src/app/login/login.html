<div class="min-h-screen bg-slate-900 p-8 flex items-center justify-center">
  <div class="w-full max-w-lg bg-slate-800 rounded-xl shadow-2xl border border-slate-700 overflow-hidden">
    <div class="bg-slate-900/50 px-8 py-8 border-b border-slate-700 flex flex-col items-center gap-3">
      <div class="w-12 h-12 rounded-xl flex items-center justify-center font-bold text-white shadow-lg"
           style="background: linear-gradient(135deg, #3b82f6, #6366f1);">
        BP
      </div>
      <h1 class="text-2xl font-bold text-slate-100">Sign In</h1>
      <p class="text-slate-400 text-sm">BookPartner API Portal</p>
    </div>

    <div class="p-8 space-y-5">
      <div class="space-y-2">
        <label class="text-sm font-semibold text-slate-300">Username</label>
        <input
          class="w-full rounded-lg border border-slate-600 bg-slate-900 px-4 py-2.5 text-slate-100 placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-blue-500"
          type="text"
          placeholder="Enter username"
          [(ngModel)]="username"
        />
      </div>

      <div class="space-y-2">
        <label class="text-sm font-semibold text-slate-300">Password</label>
        <input
          class="w-full rounded-lg border border-slate-600 bg-slate-900 px-4 py-2.5 text-slate-100 placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-blue-500"
          type="password"
          placeholder="Enter password"
          [(ngModel)]="password"
        />
      </div>

      <button
        class="w-full bg-blue-600 text-white px-6 py-3 rounded-lg font-semibold hover:bg-blue-500 transition"
        (click)="onLogin()"
      >
        Sign In
      </button>

      <button
        type="button"
        class="w-full text-slate-400 hover:text-blue-400 transition flex items-center justify-center gap-2 text-sm"
        (click)="goBack()"
      >
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
          <path
            d="M11 7H3M3 7L7 3M3 7L7 11"
            stroke="currentColor"
            stroke-width="1.5"
            stroke-linecap="round"
            stroke-linejoin="round"
          />
        </svg>
        Back to user selection
      </button>
    </div>
  </div>
</div>
