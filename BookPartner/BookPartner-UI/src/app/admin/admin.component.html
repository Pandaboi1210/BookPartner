<div class="min-h-screen bg-slate-900 p-8 text-slate-200">
  <div class="max-w-2xl mx-auto bg-slate-800 rounded-xl border border-slate-700 shadow-2xl overflow-hidden">
    <div class="bg-slate-900/50 px-6 py-5 border-b border-slate-700">
      <div class="flex items-start justify-between gap-3 flex-wrap">
        <div>
          <h1 class="text-2xl font-bold text-slate-100">Admin Access Panel</h1>
          <p class="text-slate-400 text-sm">Open user modules from top to bottom.</p>
        </div>
        <button (click)="logout()" class="bg-red-600 text-white px-4 py-2 rounded-md font-semibold hover:bg-red-500 transition">
          Logout
        </button>
      </div>
    </div>

    <div class="p-6 space-y-3">
      <button class="w-full bg-blue-900/20 py-3 px-4 rounded hover:bg-blue-900/40 transition text-left border border-blue-800/50 text-blue-300 font-semibold" (click)="openModule('pradeep')">
        Pradeep
      </button>

      <button class="w-full bg-cyan-900/20 py-3 px-4 rounded hover:bg-cyan-900/40 transition text-left border border-cyan-800/50 text-cyan-300 font-semibold" (click)="openModule('hema')">
        Hema
      </button>

      <button class="w-full bg-violet-900/20 py-3 px-4 rounded hover:bg-violet-900/40 transition text-left border border-violet-800/50 text-violet-300 font-semibold" (click)="openModule('soumya')">
        Soumya
      </button>

      <button class="w-full bg-emerald-900/20 py-3 px-4 rounded hover:bg-emerald-900/40 transition text-left border border-emerald-800/50 text-emerald-300 font-semibold" (click)="openModule('harini')">
        Harini
      </button>

      <button class="w-full bg-rose-900/20 py-3 px-4 rounded hover:bg-rose-900/40 transition text-left border border-rose-800/50 text-rose-300 font-semibold" (click)="openModule('subasri')">
        Subasri
      </button>
    </div>
  </div>
</div>
